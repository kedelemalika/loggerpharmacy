    adafruit/RTClib @ ^2.1.4
    DFRobot/DFRobot_SHT20 @ ^1.0.0
    adafruit/Adafruit SPIFlash @ ^4.3.4

[env:test_experimental_htu21_on_esp32]
# Compile-only: Test HTU21 sensor path with ESP32 in ALLOW_EXPERIMENTAL mode.
# HTU21 is not validated for ESP32 but ALLOW_EXPERIMENTAL suppresses combo check.
# Purpose: Keep HTU21 compile path healthy, verify sensor selection macro.
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = default.csv
board_build.filesystem = littlefs
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DWM_POLICY_ALLOW_EXPERIMENTAL=1
    -DWM_BOARD_ESP32=1
    -DWM_SENSOR_TYPE_HTU21=1
lib_deps =
    tzapu/WiFiManager @ ^2.0.17
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.1.0
    adafruit/Adafruit GFX Library @ ^1.11.11
    adafruit/Adafruit SH110X @ ^2.1.12
    adafruit/RTClib @ ^2.1.4
    adafruit/Adafruit SPIFlash @ ^4.3.4

