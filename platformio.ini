[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = default.csv
board_build.filesystem = littlefs
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DWM_POLICY_STRICT=1
    -DWM_BOARD_ESP32=1
    -DWM_SENSOR_TYPE_SHT20=1
lib_deps =
    tzapu/WiFiManager @ ^2.0.17
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.1.0
    adafruit/Adafruit GFX Library @ ^1.11.11
    adafruit/Adafruit SH110X @ ^2.1.12
    adafruit/RTClib @ ^2.1.4
    DFRobot/DFRobot_SHT20 @ ^1.0.0
    adafruit/Adafruit SPIFlash @ ^4.3.4

# ============================================================================
# TEST ENVIRONMENTS (for STRICT/ALLOW_EXPERIMENTAL validation only — temporary)
# ============================================================================

[env:test_strict_dual_sensor]
# Test: Force BOTH sensor types on ESP32 in STRICT mode.
# Expected: #error "Multiple sensor types defined" — MUST fail in ALL policy modes.
# Purpose: Prove exactly-one-sensor rule is always enforced.
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = default.csv
board_build.filesystem = littlefs
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DWM_POLICY_STRICT=1
    -DWM_BOARD_ESP32=1
    -DWM_SENSOR_TYPE_SHT20=1
    -DWM_SENSOR_TYPE_AHT10=1
lib_deps =
    tzapu/WiFiManager @ ^2.0.17
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.1.0
    adafruit/Adafruit GFX Library @ ^1.11.11
    adafruit/Adafruit SH110X @ ^2.1.12
    adafruit/RTClib @ ^2.1.4
    DFRobot/DFRobot_SHT20 @ ^1.0.0
    adafruit/Adafruit AHTX0 @ ^2.0.5
    adafruit/Adafruit SPIFlash @ ^4.3.4

[env:test_experimental_dual_sensor]
# Test: Force BOTH sensor types on ESP32 in ALLOW_EXPERIMENTAL mode.
# Expected: #error "Multiple sensor types defined" — STILL MUST FAIL.
# Purpose: Prove ALLOW_EXPERIMENTAL does NOT bypass exactly-one-sensor rule.
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = default.csv
board_build.filesystem = littlefs
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DWM_POLICY_ALLOW_EXPERIMENTAL=1
    -DWM_BOARD_ESP32=1
    -DWM_SENSOR_TYPE_SHT20=1
    -DWM_SENSOR_TYPE_AHT10=1
lib_deps =
    tzapu/WiFiManager @ ^2.0.17
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.1.0
    adafruit/Adafruit GFX Library @ ^1.11.11
    adafruit/Adafruit SH110X @ ^2.1.12
    adafruit/RTClib @ ^2.1.4
    DFRobot/DFRobot_SHT20 @ ^1.0.0
    adafruit/Adafruit AHTX0 @ ^2.0.5
    adafruit/Adafruit SPIFlash @ ^4.3.4

[env:test_experimental_invalid_combo]
# Test: Single sensor (AHT10) + ESP32 in ALLOW_EXPERIMENTAL mode.
# ESP32+AHT10 is not validated but ALLOW_EXPERIMENTAL suppresses combo check.
# Expected: Compile succeeds with #pragma message warning.
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = default.csv
board_build.filesystem = littlefs
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DWM_POLICY_ALLOW_EXPERIMENTAL=1
    -DWM_BOARD_ESP32=1
    -DWM_SENSOR_TYPE_AHT10=1
lib_deps =
    tzapu/WiFiManager @ ^2.0.17
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.1.0
    adafruit/Adafruit GFX Library @ ^1.11.11
    adafruit/Adafruit SH110X @ ^2.1.12
    adafruit/RTClib @ ^2.1.4
    adafruit/Adafruit AHTX0 @ ^2.0.5
    adafruit/Adafruit SPIFlash @ ^4.3.4

